<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
    <pattern id="blueprintGrid" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#d4a843" stroke-width="0.3" opacity="0.06"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#d4a843" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#d4a843" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTopRight" cx="85%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0"/>
      <stop offset="30%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#0a0a0a"/>

  <!-- Dot grid -->
  <rect width="1920" height="1080" fill="url(#dotGrid)"/>

  <!-- Blueprint grid -->
  <rect width="1920" height="1080" fill="url(#blueprintGrid)"/>

  <!-- Ambient glow -->
  <rect width="1920" height="1080" fill="url(#glowCenter)"/>
  <rect width="1920" height="1080" fill="url(#glowTopRight)"/>

  <!-- Diagonal accent lines -->
  <line x1="1200" y1="0" x2="1920" y2="600" stroke="url(#lineGlow)" stroke-width="0.5"/>
  <line x1="1400" y1="0" x2="1920" y2="400" stroke="url(#lineGlow)" stroke-width="0.5"/>
  <line x1="0" y1="800" x2="600" y2="1080" stroke="url(#lineGlow)" stroke-width="0.5"/>

  <!-- Subtle construction crosshair marks -->
  <g opacity="0.04" stroke="#d4a843" stroke-width="0.8">
    <!-- Mark 1 -->
    <line x1="300" y1="240" x2="340" y2="240"/>
    <line x1="320" y1="220" x2="320" y2="260"/>
    <circle cx="320" cy="240" r="8" fill="none"/>

    <!-- Mark 2 -->
    <line x1="1580" y1="720" x2="1620" y2="720"/>
    <line x1="1600" y1="700" x2="1600" y2="740"/>
    <circle cx="1600" cy="720" r="8" fill="none"/>

    <!-- Mark 3 -->
    <line x1="960" y1="880" x2="1000" y2="880"/>
    <line x1="980" y1="860" x2="980" y2="900"/>
    <circle cx="980" cy="880" r="8" fill="none"/>
  </g>

  <!-- Scattered measurement-style tick marks -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="160" y1="500" x2="160" y2="520"/>
    <line x1="160" y1="500" x2="180" y2="500"/>
    <line x1="1750" y1="300" x2="1750" y2="320"/>
    <line x1="1750" y1="300" x2="1770" y2="300"/>
    <line x1="700" y1="150" x2="700" y2="170"/>
    <line x1="700" y1="150" x2="720" y2="150"/>
  </g>

  <!-- Edge fades -->
  <rect x="0" y="0" width="1920" height="120" fill="url(#fadeTop)"/>
  <rect x="0" y="900" width="1920" height="180" fill="url(#fadeBottom)"/>
</svg>
